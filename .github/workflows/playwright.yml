name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 */6 * * *'
jobs:
  test:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --reporter=json > results.json || true

    - name: Send Slack Notification
      if: always()
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        TOTAL_TESTS=$(grep -o '"status":' results.json | wc -l || echo "0")
        FAILED_TESTS=$(grep -o '"status":"failed"' results.json | wc -l || echo "0")
        
        # Determine status and icon
        if [ "$FAILED_TESTS" -eq 0 ]; then
          ICON="✅"
          STATUS="Success"
        else
          ICON="🚨"
          STATUS="Failure"
        fi
        
        PAYLOAD=$(cat <<EOF
        {
          "text": "AutoSites Regression Sentinel Notification",
          "blocks": [
            {
              "type": "header",
              "text": { "type": "plain_text", "text": "$ICON AutoSites Regression Sentinel" }
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Summary:*\nAutomated E2E Regression & Stability Monitoring for NextJS Production Environments"
              }
            },
            {
              "type": "section",
              "fields": [
                { "type": "mrkdwn", "text": "*Total Tests:*\n$TOTAL_TESTS" },
                { "type": "mrkdwn", "text": "*Failures:*\n$FAILED_TESTS" },
                { "type": "mrkdwn", "text": "*Status:*\n$STATUS" }
              ]
            },
            {
              "type": "section",
              "text": {
                "type": "mrkdwn",
                "text": "*Target Websites:*\n• VehiclesReport\n• MotorcycleVINLookup\n• VehicleHistoryEU\n• VINNumberCA"
              }
            },
            {
              "type": "actions",
              "elements": [
                {
                  "type": "button",
                  "text": { "type": "plain_text", "text": "View Full Report" },
                  "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                }
              ]
            }
          ]
        }
        EOF
        )
        curl -X POST -H 'Content-type: application/json' --data "$PAYLOAD" $SLACK_WEBHOOK_URL
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
